name: CI

on:
  # ci.yml is tracked in BOTH repos this project shares a working tree with
  # (see CLAUDE.md's Public CI section). Both now use `main` as their default
  # branch (unified 2026-07-22 -- the private deployment repo was previously
  # on `master`, which is why this trigger silently never ran there at all
  # despite Actions being enabled and the workflow file present).
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build + test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [22]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: |
            pa/package-lock.json
            projects/telegram-bot/package-lock.json

      # Order is load-bearing — do not parallelize into separate jobs: the
      # bot imports pa's compiled dist/ output directly (relative imports
      # like ../../../pa/dist/src/...) AND resolves its own dependencies
      # from pa/node_modules at runtime (no separate install for pa's deps
      # in the bot's own node_modules). pa must be installed + built before
      # the bot's install/build/test step runs.
      - name: Build and test pa orchestrator
        working-directory: pa
        run: |
          npm ci
          npm run build
          npm test

      - name: Build and test Telegram bot
        working-directory: projects/telegram-bot
        run: |
          npm ci
          npm run build
          npm test

      # 2026-07-23: this CI job (the one required by branch protection) never
      # ran the Python suite at all -- pre-push-pii-guard, pii_ci_scan.py, and
      # friends only ever got tested by someone remembering to run them by
      # hand. Runs across all 3 platforms deliberately: the guard's own
      # tests exercise both the win32 (.cmd shim) and POSIX (chmod/killpg)
      # code paths. verify_pii_guard_agy_e2e.py is deliberately NOT run here
      # -- it needs a real agy binary that doesn't exist on these runners and
      # is a manual/on-demand harness by design.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # No pa/requirements.txt exists -- these two are the only non-stdlib
      # imports across all 5 test_*.py files (test_backup_secrets.py needs
      # cryptography; test_finish_google_telegram_reauth.py needs
      # google-auth-oauthlib), installed explicitly rather than narrowing
      # which tests run.
      - name: Install Python test dependencies
        run: pip install cryptography google-auth-oauthlib

      - name: Run Python test suite (PII guard + related tooling)
        run: python -m unittest discover -s pa/scripts/tests -p "test_*.py"
        env:
          PYTHONIOENCODING: utf-8
